site_name: Motus
site_url: !ENV [READTHEDOCS_CANONICAL_URL, "https://lithos.readthedocs.io"]
site_description: Motus Full-Stack AI Agent Framework
site_author: gpuOS
repo_url: https://github.com/gpuOS-ai/lithos
repo_name: gpuOS-ai/lithos
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 gpuOS

docs_dir: docs
exclude_docs: |
  plan.md

theme:
  name: material
  custom_dir: docs/mkdocs/overrides
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/brightness-2
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - mkdocs/css/extra.css

extra_javascript:
  - mkdocs/js/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
  - mkdocs/js/extra.js

plugins:
  - meta
  - search
  - autorefs
  - awesome-nav
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      exclude:
        - api/*
        - examples/*
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      cache_safe: true
  - api-autonav:
      modules: ["src/motus"]
      api_root_uri: "api"
      exclude:
        - "re:motus\\._.*"  # Internal modules
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true
            show_signature_annotations: true
            show_overloads: true
            summary:
              modules: true
            filters:
              - "!^_"
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://typing-extensions.readthedocs.io/en/latest/objects.inv
            - https://docs.pydantic.dev/latest/objects.inv
            - https://fastapi.tiangolo.com/objects.inv
            - https://docs.aiohttp.org/en/stable/objects.inv
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true

hooks:
  - docs/mkdocs/hooks/remove_announcement.py
  - docs/mkdocs/hooks/generate_examples.py
  - docs/mkdocs/hooks/url_schemes.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gpuOS-ai/lithos

# NOTE: Enable strict mode once content is written and warnings are resolved
# strict: true

validation:
  omitted_files: info
  absolute_links: info
  unrecognized_links: info
